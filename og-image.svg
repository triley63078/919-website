<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b1929"/>
      <stop offset="100%" style="stop-color:#0f2744"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a6fc4"/>
      <stop offset="100%" style="stop-color:#3b9edd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Blue accent bar left -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Blue accent bar bottom -->
  <rect x="0" y="580" width="1200" height="6" fill="url(#accent)" opacity="0.5"/>

  <!-- 919 big number -->
  <text x="100" y="310" font-family="Arial Black, Arial, sans-serif" font-size="200" font-weight="900" fill="rgba(255,255,255,0.04)" letter-spacing="-8">919</text>

  <!-- Main logo text -->
  <text x="100" y="240" font-family="Arial Black, Arial, sans-serif" font-size="96" font-weight="900" fill="white" letter-spacing="-3">919</text>
  <text x="100" y="310" font-family="Arial, sans-serif" font-size="36" font-weight="400" fill="#3b9edd" letter-spacing="12">IT SOLUTIONS</text>

  <!-- Divider -->
  <rect x="100" y="340" width="120" height="3" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="100" y="400" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.7)" letter-spacing="1">Honest. Experienced. Local.</text>

  <!-- Sub text -->
  <text x="100" y="450" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.4)">Managed IT Services · Triangle Region, NC</text>

  <!-- Right side decorative circles -->
  <circle cx="980" cy="315" r="220" fill="none" stroke="rgba(59,158,221,0.08)" stroke-width="1"/>
  <circle cx="980" cy="315" r="160" fill="none" stroke="rgba(59,158,221,0.1)" stroke-width="1"/>
  <circle cx="980" cy="315" r="100" fill="none" stroke="rgba(59,158,221,0.12)" stroke-width="1"/>
  <circle cx="980" cy="315" r="50" fill="rgba(26,111,196,0.15)" stroke="rgba(59,158,221,0.2)" stroke-width="1"/>

  <!-- Shield icon in circle -->
  <text x="960" y="328" font-family="Arial, sans-serif" font-size="36" fill="rgba(59,158,221,0.6)" text-anchor="middle">🔒</text>

  <!-- URL -->
  <text x="100" y="550" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.3)">919solutions.com · 919-391-9449</text>
</svg>
